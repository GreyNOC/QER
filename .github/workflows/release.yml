name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  binaries:
    name: Build ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: qer-linux-x64
          - os: macos-latest
            asset: qer-macos-arm64
          - os: windows-latest
            asset: qer-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e . pyinstaller
      - name: Sanity-check the tests
        run: pip install pytest && pytest -q
      - name: Build single-file binary
        run: pyinstaller --onefile --name qer --collect-submodules qer packaging/qer_entry.py
      - name: Rename binary
        shell: bash
        run: |
          if [ -f dist/qer.exe ]; then mv dist/qer.exe "dist/${{ matrix.asset }}"; else mv dist/qer "dist/${{ matrix.asset }}"; fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  pydist:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build && python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: pydist
          path: dist/*

  release:
    name: Publish GitHub release
    needs: [binaries, pydist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect assets
        run: |
          mkdir -p out
          find artifacts -type f -exec cp {} out/ \;
          ls -la out
      - uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
          fail_on_unmatched_files: true
